# =============================================================================
# Sport Lottery Sweeper - 生产环境Docker Compose配置
# 集成安全扫描、资源限制、健康检查、日志管理
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # 反向代理 (Nginx) - 安全加固版
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: soccer-nginx-prod
    hostname: soccer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - ./data/ssl:/etc/ssl/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - soccer-network
    # 安全加固
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # 后端API服务 - 生产优化版
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        BUILD_DATE: "${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
        VERSION: "${VERSION:-latest}"
        VCS_REF: "${VCS_REF:-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)}"
    container_name: soccer-backend-prod
    hostname: soccer-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - RUN_MIGRATIONS=true
      - RUN_MODE=gunicorn
      - DATABASE_URL=${DATABASE_URL:-postgresql://soccer_user:soccer_password@postgres:5432/soccer_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://yourdomain.com}
    volumes:
      - ./logs/backend:/app/logs:rw,rslave
      - ./data:/app/data:rw,rslave
      - ./uploads:/app/uploads:rw,rslave
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soccer-network
    # 安全加固
    read_only: false  # 需要写入日志和数据
    tmpfs:
      - /tmp
      - /app/logs
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ===========================================================================
  # 前端应用 - 生产优化版
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        BUILD_DATE: "${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
        VERSION: "${VERSION:-latest}"
    container_name: soccer-frontend-prod
    hostname: soccer-frontend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://www.sweeper365.cn/api}
    volumes:
      - ./logs/frontend:/app/logs:rw,rslave
    ports:
      - "3000:3000"
    networks:
      - soccer-network
    # 安全加固
    read_only: true
    tmpfs:
      - /tmp
      - /app/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # PostgreSQL数据库 - 安全加固版
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: soccer-postgres-prod
    hostname: soccer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soccer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-soccer_db}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw,rslave
      - ./infrastructure/docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups:rw,rslave
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问
    networks:
      - soccer-network
    # 安全加固
    read_only: false
    tmpfs:
      - /tmp
      - /var/run/postgresql
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soccer_user} -d ${POSTGRES_DB:-soccer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis缓存 - 安全加固版
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: soccer-redis-prod
    hostname: soccer-redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --appendfilename "appendonly.aof"
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
    volumes:
      - redis_data:/data:rw,rslave
      - ./infrastructure/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    networks:
      - soccer-network
    # 安全加固
    read_only: false
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ===========================================================================
  # MongoDB - 安全加固版
  # ===========================================================================
  mongo:
    image: mongo:6
    container_name: soccer-mongo-prod
    hostname: soccer-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-soccer_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-soccer_logs}
    volumes:
      - mongo_data:/data/db:rw,rslave
      - ./infrastructure/docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
      - ./backups/mongo:/backups:rw,rslave
    ports:
      - "127.0.0.1:27017:27017"  # 仅本地访问
    networks:
      - soccer-network
    # 安全加固
    read_only: false
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # 健康检查
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Celery Worker - 生产优化版
  # ===========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: soccer-celery-worker-prod
    hostname: soccer-celery-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - ./logs/backend:/app/logs:rw,rslave
      - ./data:/app/data:rw,rslave
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - soccer-network
    # 安全加固
    read_only: false
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    # 健康检查
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ===========================================================================
  # 安全扫描服务
  # ===========================================================================
  security_scanner:
    image: aquasec/trivy:latest
    container_name: soccer-security-scanner
    hostname: soccer-security-scanner
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./reports:/reports:rw
      - trivy_cache:/root/.cache
    environment:
      - TRIVY_CACHE_DIR=/root/.cache
      - TRIVY_FORMAT=table
      - TRIVY_SEVERITY=HIGH,CRITICAL
    networks:
      - soccer-network
    command: |
      sh -c "
      echo '=== Docker镜像安全扫描 ===' &&
      trivy image --exit-code 1 --severity HIGH,CRITICAL nginx:1.25-alpine &&
      trivy image --exit-code 1 --severity HIGH,CRITICAL postgres:15-alpine &&
      trivy image --exit-code 1 --severity HIGH,CRITICAL redis:7-alpine &&
      trivy image --exit-code 1 --severity HIGH,CRITICAL mongo:6 &&
      echo '=== 扫描完成 ===' &&
      trivy image --format json --output /reports/security_scan.json soccer-backend-prod || true
      "
    profiles:
      - security

networks:
  soccer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: soccer-br

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/soccer/postgres_data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/soccer/redis_data
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/soccer/mongo_data
  trivy_cache:
    driver: local