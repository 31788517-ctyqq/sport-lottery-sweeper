# Nginx Configuration for Production Environment with SSL
# 生产环境Nginx配置（含SSL证书）

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format timed_combined '$remote_addr - $remote_user [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" "$http_x_forwarded_for" '
                             'request_time=$request_time upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # 基本优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 上游服务器配置
    upstream backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        # 如果有多个后端实例，可以在这里添加
        # server backend2:8000 max_fails=3 fail_timeout=30s;
    }

    upstream frontend {
        server frontend:80;
    }

    # HTTP重定向到HTTPS
    server {
        listen 80;
        server_name sport-lottery.example.com www.sport-lottery.example.com;
        
        # ACME挑战支持（Let's Encrypt）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 重定向所有HTTP流量到HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS主服务器配置
    server {
        listen 443 ssl http2;
        server_name sport-lottery.example.com www.sport-lottery.example.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/sport-lottery.example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/sport-lottery.example.com.key;
        
        # Let's Encrypt证书（如果使用）
        # ssl_certificate /etc/letsencrypt/live/sport-lottery.example.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/sport-lottery.example.com/privkey.pem;

        # SSL安全配置
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # HSTS配置
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全头
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # 代理设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API代理到后端
        location /api/ {
            access_log /var/log/nginx/api_access.log timed_combined;
            
            # 限流配置
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            
            # 缓存配置
            proxy_cache api_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # 管理后台代理
        location /admin/ {
            access_log /var/log/nginx/admin_access.log timed_combined;
            
            # 更严格的限流
            limit_req zone=admin burst=10 nodelay;
            
            # 基本认证（可选）
            # auth_basic "Admin Area";
            # auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://backend;
        }

        # WebSocket支持（如果需要）
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # 前端静态资源
        location / {
            proxy_pass http://frontend;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            
            # HTML不缓存
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache";
            }
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=2r/s;

    # 缓存配置
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # 包含其他配置
    include /etc/nginx/conf.d/*.conf;
}