<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>主页加载诊断</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .test-section {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 8px;
      max-width: 900px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1, h2 { margin-top: 0; }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #f44336; font-weight: bold; }
    .info { color: #2196F3; }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
    }
    .test-item {
      padding: 15px;
      margin: 10px 0;
      border-left: 4px solid #ccc;
      background: #f9f9f9;
    }
    .test-item.pass { border-left-color: #4CAF50; background: #e8f5e9; }
    .test-item.fail { border-left-color: #f44336; background: #ffebee; }
    .test-item.loading { border-left-color: #2196F3; background: #e3f2fd; }
  </style>
</head>
<body>
  <div class="test-section">
    <h1>🔍 主页加载诊断工具</h1>

    <div id="test-results"></div>

    <div style="margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 8px;">
      <h3>📋 下一步操作建议:</h3>
      <ul>
        <li>如果所有测试都通过,请访问 <a href="/index.html" target="_blank">主页</a></li>
        <li>如果有失败的测试,请查看上面的错误信息</li>
        <li>也可以按F12查看浏览器控制台的完整错误</li>
      </ul>
    </div>
  </div>

  <script>
    const resultsDiv = document.getElementById('test-results');

    function addTest(id, name, status, message, details = '') {
      const div = document.createElement('div');
      div.className = `test-item ${status}`;
      div.innerHTML = `
        <h3>${name}</h3>
        <p><strong>状态:</strong> <span class="${status}">${status === 'pass' ? '✅ 通过' : (status === 'fail' ? '❌ 失败' : '⏳ 测试中')}</span></p>
        <p><strong>信息:</strong> ${message}</p>
        ${details ? `<pre>${details}</pre>` : ''}
      `;
      resultsDiv.appendChild(div);
    }

    async function runDiagnostics() {
      // 测试1: 获取主页HTML
      addTest('test1', '测试1: 获取主页HTML', 'loading', '正在获取主页HTML...');
      try {
        const response = await fetch('/index.html');
        const html = await response.text();
        if (response.ok) {
          addTest('test1', '测试1: 获取主页HTML', 'pass', '主页HTML获取成功', `状态码: ${response.status}\n\nHTML内容预览:\n${html.substring(0, 500)}...`);
        } else {
          addTest('test1', '测试1: 获取主页HTML', 'fail', `主页HTML获取失败: HTTP ${response.status}`);
        }
      } catch (error) {
        addTest('test1', '测试1: 获取主页HTML', 'fail', `错误: ${error.message}`);
      }

      // 测试2: 获取main.js
      addTest('test2', '测试2: 获取main.js', 'loading', '正在获取main.js...');
      try {
        const response = await fetch('/src/main.js');
        const js = await response.text();
        if (response.ok) {
          addTest('test2', '测试2: 获取main.js', 'pass', 'main.js获取成功', `大小: ${js.length} 字节\n\n内容预览:\n${js.substring(0, 500)}...`);
        } else {
          addTest('test2', '测试2: 获取main.js', 'fail', `main.js获取失败: HTTP ${response.status}`);
        }
      } catch (error) {
        addTest('test2', '测试2: 获取main.js', 'fail', `错误: ${error.message}`);
      }

      // 测试3: 尝试导入main.js模块
      addTest('test3', '测试3: 导入main.js模块', 'loading', '正在导入main.js模块...');
      try {
        const start = Date.now();
        await import('/src/main.js');
        const elapsed = Date.now() - start;
        addTest('test3', '测试3: 导入main.js模块', 'pass', `main.js模块导入成功,耗时 ${elapsed}ms`);
      } catch (error) {
        addTest('test3', '测试3: 导入main.js模块', 'fail', `错误: ${error.message}\n\n堆栈跟踪:\n${error.stack}`);
      }

      // 测试4: 检查App.vue
      addTest('test4', '测试4: 检查App.vue', 'loading', '正在检查App.vue...');
      try {
        const response = await fetch('/src/App.vue');
        if (response.ok) {
          const vue = await response.text();
          addTest('test4', '测试4: 检查App.vue', 'pass', 'App.vue存在且可访问', `大小: ${vue.length} 字节`);
        } else {
          addTest('test4', '测试4: 检查App.vue', 'fail', `App.vue访问失败: HTTP ${response.status}`);
        }
      } catch (error) {
        addTest('test4', '测试4: 检查App.vue', 'fail', `错误: ${error.message}`);
      }

      // 测试5: 检查stores
      addTest('test5', '测试5: 检查stores', 'loading', '正在检查stores...');
      try {
        const response = await fetch('/src/stores/app.js');
        if (response.ok) {
          const store = await response.text();
          addTest('test5', '测试5: 检查stores', 'pass', 'stores/app.js存在且可访问', `大小: ${store.length} 字节`);
        } else {
          addTest('test5', '测试5: 检查stores', 'fail', `stores/app.js访问失败: HTTP ${response.status}`);
        }
      } catch (error) {
        addTest('test5', '测试5: 检查stores', 'fail', `错误: ${error.message}`);
      }

      // 测试6: 检查样式文件
      addTest('test6', '测试6: 检查样式文件', 'loading', '正在检查样式文件...');
      try {
        const response = await fetch('/src/styles/main-content.css');
        if (response.ok) {
          const css = await response.text();
          addTest('test6', '测试6: 检查样式文件', 'pass', 'main-content.css存在且可访问', `大小: ${css.length} 字节`);
        } else {
          addTest('test6', '测试6: 检查样式文件', 'fail', `main-content.css访问失败: HTTP ${response.status}`);
        }
      } catch (error) {
        addTest('test6', '测试6: 检查样式文件', 'fail', `错误: ${error.message}`);
      }
    }

    // 延迟执行测试,确保页面加载完成
    setTimeout(runDiagnostics, 500);
  </script>
</body>
</html>
