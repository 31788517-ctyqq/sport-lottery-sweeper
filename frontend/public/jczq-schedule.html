<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞彩赛程 - 数据展示</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .league-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 4px;
            font-size: 12px;
        }
        .odds {
            font-family: monospace;
            text-align: center;
        }
        .popularity-bar {
            width: 100px;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            margin-left: 10px;
        }
        .popularity-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #f44336;
        }
        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
    
    <div class="container">
        <div class="header">
            <h1>⚽ 竞彩足球赛程</h1>
            <p>500万彩票数据源 - 实时数据展示</p>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalMatches">-</div>
                <div class="stat-label">总场次</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avgPopularity">-</div>
                <div class="stat-label">平均热度</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="dataSource">500万彩票</div>
                <div class="stat-label">数据源</div>
            </div>
        </div>
        
        <div id="loading" class="loading">正在加载数据...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <table id="matchesTable" style="display: none;">
            <thead>
                <tr>
                    <th>比赛时间</th>
                    <th>联赛</th>
                    <th>主队</th>
                    <th>客队</th>
                    <th>胜</th>
                    <th>平</th>
                    <th>负</th>
                    <th>热度</th>
                </tr>
            </thead>
            <tbody id="matchesBody">
            </tbody>
        </table>
    </div>

    <script>
        // 直接从数据库查询数据（通过后端API）
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const table = document.getElementById('matchesTable');
            const tbody = document.getElementById('matchesBody');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            table.style.display = 'none';
            
            try {
                // 从后端API获取数据
                const response = await fetch('http://localhost:8000/api/v1/lottery/matches?size=100');
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.message || '获取数据失败');
                }
                
                const matches = data.data || [];
                
                if (matches.length === 0) {
                    // 如果API没有数据，显示提示
                    throw new Error('后端暂无数据，请检查数据源配置');
                }
                
                // 显示统计数据
                document.getElementById('totalMatches').textContent = matches.length;
                
                const avgPop = Math.round(matches.reduce((sum, m) => sum + (m.popularity || 0), 0) / matches.length);
                document.getElementById('avgPopularity').textContent = avgPop;
                
                // 渲染表格
                tbody.innerHTML = '';
                matches.forEach(match => {
                    const tr = document.createElement('tr');
                    
                    const matchTime = new Date(match.match_time).toLocaleString('zh-CN');
                    const popularity = match.popularity || 0;
                    const popularityPercent = Math.min(100, (popularity / 10000) * 100);
                    
                    tr.innerHTML = `
                        <td>${matchTime}</td>
                        <td><span class="league-tag">${match.league || '-'}</span></td>
                        <td><strong>${match.home_team || '-'}</strong></td>
                        <td><strong>${match.away_team || '-'}</strong></td>
                        <td class="odds">${(match.odds_home_win || 0).toFixed(2)}</td>
                        <td class="odds">${(match.odds_draw || 0).toFixed(2)}</td>
                        <td class="odds">${(match.odds_away_win || 0).toFixed(2)}</td>
                        <td>
                            ${popularity}
                            <div class="popularity-bar">
                                <div class="popularity-fill" style="width: ${popularityPercent}%"></div>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                loading.style.display = 'none';
                table.style.display = 'table';
                
            } catch (err) {
                console.error('加载数据失败:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                error.innerHTML = `
                    <h3>❌ 加载失败</h3>
                    <p>${err.message}</p>
                    <p>请确保：</p>
                    <ol style="text-align: left; max-width: 400px; margin: 10px auto;">
                        <li>后端服务运行在8000端口</li>
                        <li>数据库中有比赛数据</li>
                        <li>API路由正确注册</li>
                    </ol>
                `;
            }
        }
        
        // 页面加载完成后自动获取数据
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
