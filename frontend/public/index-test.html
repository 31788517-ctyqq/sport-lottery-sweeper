<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>测试 - 静态HTML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      color: #333;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { color: #667eea; margin-top: 0; }
    .success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    .info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ 静态HTML测试成功!</h1>

    <div class="success">
      <strong>好消息:</strong> 如果您能看到这个页面,说明Vite服务器正在正常运行,并且可以正确提供静态文件!
    </div>

    <div class="info">
      <h3>下一步:</h3>
      <ol>
        <li><a href="/index.html" target="_blank">访问原始主页 (index.html)</a></li>
        <li><a href="/test-index.html" target="_blank">检查主页内容</a></li>
        <li><a href="/frontend-check.html" target="_blank">运行完整诊断</a></li>
      </ol>
    </div>

    <div class="info">
      <h3>如果主页显示空白:</h3>
      <p>这说明JavaScript有问题。请检查浏览器控制台(F12)的错误信息。</p>
    </div>

    <div class="info">
      <h3>当前环境信息:</h3>
      <ul>
        <li>URL: <span id="current-url"></span></li>
        <li>时间: <span id="current-time"></span></li>
        <li>用户代理: <span id="user-agent"></span></li>
      </ul>
    </div>
  </div>

  <script>
    document.getElementById('current-url').textContent = window.location.href;
    document.getElementById('current-time').textContent = new Date().toLocaleString('zh-CN');
    document.getElementById('user-agent').textContent = navigator.userAgent.substring(0, 100) + '...';
  </script>
</body>
</html>
