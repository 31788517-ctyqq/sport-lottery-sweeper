<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Vue挂载测试</title>
  <link rel="stylesheet" href="/src/assets/font-awesome/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .test-section {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 8px;
      max-width: 800px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1, h2 { margin-top: 0; }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #f44336; font-weight: bold; }
    .info { color: #2196F3; }
    #app {
      margin-top: 20px;
      padding: 20px;
      border: 2px solid #2196F3;
      border-radius: 8px;
      background: #e3f2fd;
    }
    .app-content {
      color: #1565C0;
      font-size: 18px;
    }
    #app-content-info {
      margin-top: 10px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="test-section">
    <h1>🧪 Vue应用挂载测试</h1>

    <h2>测试步骤:</h2>
    <ol>
      <li>加载Vue和Pinia库</li>
      <li>创建Vue应用实例</li>
      <li>挂载到#app元素</li>
      <li>检查内容是否正确显示</li>
    </ol>

    <div id="app-mount-status">
      <p class="info">⏳ Vue应用挂载中...</p>
    </div>

    <!-- 这是Vue应用要挂载的地方 -->
    <div id="app"></div>

    <div id="app-content-info">
      <p><strong>#app元素内容:</strong></p>
      <pre id="app-content">等待Vue挂载...</pre>
    </div>
  </div>

  <script type="module">
    async function testVueMount() {
      const statusDiv = document.getElementById('app-mount-status');
      const contentPre = document.getElementById('app-content');

      try {
        // 1. 导入Vue
        statusDiv.innerHTML = '<p class="info">📦 正在导入Vue...</p>';
        const { createApp } = await import('/node_modules/vue/dist/vue.esm-browser.js');

        // 2. 导入Pinia
        statusDiv.innerHTML = '<p class="info">📦 正在导入Pinia...</p>';
        const { createPinia } = await import('/node_modules/pinia/dist/pinia.esm-browser.js');

        // 3. 创建Vue应用
        statusDiv.innerHTML = '<p class="info">⚙️ 正在创建Vue应用...</p>';
        const app = createApp({
          template: `
            <div class="app-content">
              <h2>✅ Vue应用已成功挂载!</h2>
              <p>这是一个测试组件,内容由Vue渲染</p>
              <p>当前时间: {{ currentTime }}</p>
              <p>计数器: {{ count }}</p>
              <button @click="count++">点击增加计数</button>
            </div>
          `,
          data() {
            return {
              currentTime: new Date().toLocaleString('zh-CN'),
              count: 0
            };
          },
          mounted() {
            setInterval(() => {
              this.currentTime = new Date().toLocaleString('zh-CN');
            }, 1000);
          }
        });

        // 4. 使用Pinia
        const pinia = createPinia();
        app.use(pinia);

        // 5. 挂载应用
        statusDiv.innerHTML = '<p class="info">🔗 正在挂载Vue应用...</p>';
        app.mount('#app');

        // 6. 检查挂载结果
        setTimeout(() => {
          const appDiv = document.getElementById('app');
          const content = appDiv.innerHTML;

          contentPre.textContent = content;

          if (content.includes('Vue应用已成功挂载')) {
            statusDiv.innerHTML = '<p class="success">🎉 成功! Vue应用已正确挂载并渲染内容</p>';
          } else {
            statusDiv.innerHTML = '<p class="error">❌ 失败! Vue应用已挂载但内容不正确</p>';
          }
        }, 100);

      } catch (error) {
        statusDiv.innerHTML = '<p class="error">❌ 错误: ' + error.message + '</p>';
        console.error('Vue挂载测试失败:', error);
      }
    }

    // 开始测试
    testVueMount();
  </script>
</body>
</html>
