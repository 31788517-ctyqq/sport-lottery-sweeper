<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户管理样式前后对照</title>
  <style>
    body{font-family:Segoe UI,Microsoft YaHei,sans-serif;background:#f6f8fb;color:#334155;margin:0;padding:24px}
    h1{margin:0 0 16px;font-size:22px}
    .hint{margin-bottom:20px;color:#64748b}
    .grid{display:grid;grid-template-columns:1fr;gap:20px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px}
    .title{font-size:16px;font-weight:600;margin:0 0 10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .box{border:1px solid #e5e7eb;border-radius:8px;padding:8px;background:#fff}
    .label{font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}
    img{width:100%;height:auto;display:block;border-radius:6px}
  </style>
</head>
<body>
  <h1>用户管理 6 页面样式前后对照</h1>
  <div class="hint">左侧是 Before，右侧是 After（已应用统一像素规范）。</div>
  <div class="grid" id="grid"></div>
  <script>
    const pages=[
      ['01-users-list','用户列表'],
      ['02-users-roles','角色与权限'],
      ['03-users-departments','部门管理'],
      ['04-users-profile','个人中心'],
      ['05-users-profiles','用户画像管理'],
      ['06-users-logs','操作日志']
    ];
    const grid=document.getElementById('grid');
    pages.forEach(([k,name])=>{
      const el=document.createElement('div');
      el.className='card';
      el.innerHTML=`
        <p class="title">${name}</p>
        <div class="row">
          <div class="box"><div class="label">Before</div><img src="./before/${k}.png" alt="before ${name}" /></div>
          <div class="box"><div class="label">After</div><img src="./after/${k}.png" alt="after ${name}" /></div>
        </div>
      `;
      grid.appendChild(el);
    });
  </script>
</body>
</html>
