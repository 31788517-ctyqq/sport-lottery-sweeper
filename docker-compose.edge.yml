services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sls-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "${DEBUG:-false}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-sport_lottery}}
      ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-sport_lottery}}
      SECRET_KEY: ${SECRET_KEY:-fallback-test-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - sls-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.production.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_URL: /api
        VITE_WS_BASE_URL: /ws
    container_name: sls-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
      - "80"
    networks:
      - sls-net

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: sls-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/certbot/webroot:/var/www/certbot:ro
    networks:
      - sls-net

  postgres:
    image: postgres:15-alpine
    container_name: sls-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sport_lottery}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - sls_postgres_data:/var/lib/postgresql/data
    networks:
      - sls-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sport_lottery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sls-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - sls_redis_data:/data
    networks:
      - sls-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sls-net:
    driver: bridge

volumes:
  sls_postgres_data:
  sls_redis_data:
