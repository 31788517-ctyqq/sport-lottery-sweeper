version: '3.8'

services:
  # 反向代理
  nginx:
    image: nginx:alpine
    container_name: soccer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - soccer-network
    restart: unless-stopped

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: soccer-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - soccer-network
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: soccer-frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - soccer-network
    restart: unless-stopped
    command: npm run dev

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: soccer-postgres
    environment:
      POSTGRES_USER: soccer_user
      POSTGRES_PASSWORD: soccer_password
      POSTGRES_DB: soccer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - soccer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soccer_user -d soccer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: soccer-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infrastructure/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - soccer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB (用于日志和原始数据)
  mongo:
    image: mongo:6
    container_name: soccer-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: soccer_admin
      MONGO_INITDB_ROOT_PASSWORD: soccer_mongo_password
    volumes:
      - mongo_data:/data/db
      - ./infrastructure/docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - soccer-network
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: soccer-celery-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - soccer-network
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Celery Beat (定时任务)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: soccer-celery-beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - soccer-network
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # Flower (Celery监控)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: soccer-flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
      - redis
    networks:
      - soccer-network
    restart: unless-stopped
    command: celery -A app.tasks.celery_app flower

  # 爬虫服务 (使用现有的爬虫脚本)
  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: soccer-crawler
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./logs/crawler:/app/logs
      - ./data/crawler:/app/data
    depends_on:
      - redis
      - postgres
    networks:
      - soccer-network
    restart: unless-stopped
    command: python crawl_500_com.py

networks:
  soccer-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data: