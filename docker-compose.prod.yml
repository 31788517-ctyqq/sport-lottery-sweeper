# Docker Compose for Production Environment
# 体育彩票系统生产环境配置

version: '3.8'

services:
  # Backend API Service (Production)
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      args:
        - BUILD_ENV=production
    container_name: sport-lottery-backend-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/sport_lottery_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=WARNING
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./backend/logs:/app/logs:ro
      - ./backend/uploads:/app/uploads
      - /var/log/sport-lottery:/app/logs/production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport-lottery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Frontend Service (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    container_name: sport-lottery-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_API_BASE_URL=https://api.sport-lottery.example.com/api/v1
      - VITE_ENVIRONMENT=production
      - VITE_SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      - backend
    networks:
      - sport-lottery-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s

  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: sport-lottery-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sport_lottery_prod
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
      - POSTGRES_SHARED_PRELOAD_LIBRARIES=pg_stat_statements
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - postgres_prod_backup:/backups
      - ./scripts/init-db-prod.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sport-lottery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d sport_lottery_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: sport-lottery-redis-prod
    restart: unless-stopped
    command: |
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
      - redis_prod_backup:/backups
    networks:
      - sport-lottery-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Celery Worker (Production)
  celery-worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      args:
        - BUILD_ENV=production
    container_name: sport-lottery-celery-prod
    restart: unless-stopped
    command: celery -A app.celery_app:celery worker -l warning -Q default,data_processing,crawler -c 4
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/sport_lottery_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend/logs:/app/logs:ro
      - /var/log/sport-lottery:/app/logs/production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport-lottery-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Celery Beat (Production)
  celery-beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      args:
        - BUILD_ENV=production
    container_name: sport-lottery-celery-beat-prod
    restart: unless-stopped
    command: celery -A app.celery_app:celery beat -l info
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/sport_lottery_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend/logs:/app/logs:ro
      - /var/log/sport-lottery:/app/logs/production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport-lottery-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: sport-lottery-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - sport-lottery-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: sport-lottery-grafana-prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - sport-lottery-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: sport-lottery-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - sport-lottery-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2

volumes:
  postgres_prod_data:
    driver: local
  postgres_prod_backup:
    driver: local
  redis_prod_data:
    driver: local
  redis_prod_backup:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  sport-lottery-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16