# SonarQube Configuration for Sport Lottery Sweeper
# 体育彩票系统SonarQube静态分析配置

# 必填基础配置
sonar.host.url=http://localhost:9000
sonar.projectKey=sport-lottery-sweeper
sonar.organization=your-organization

# 代码路径配置
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js
sonar.inclusions=**/*.py,**/*.js,**/*.ts,**/*.vue,**/*.jsx,**/*.tsx

# 测试配置
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*.py,**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# 覆盖率配置
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# 语言配置
sonar.python.version=3.9
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Quality gate settings
sonar.qualitygate.wait=true

# Analysis parameters
sonar.verbose=false
 sonar.showProfiling=true

# Security hotspots
sonar.security.hotspots.reportPaths=backend/bandit-report.json

# Additional analysis parameters
sonar.issue.ignore.multicriteria=e1,e2
e1.ruleKey=python:S1172
e1.resourceKey=**/migrations/**
e2.ruleKey=javascript:S1172
e2.resourceKey=**/node_modules/**

# Code duplication
sonar.cpd.exclusions=**/*.vue,**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# Documentation
 sonar.sourceEncoding=UTF-8