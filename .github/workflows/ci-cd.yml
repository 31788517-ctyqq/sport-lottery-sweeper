# GitHub Actions CI/CD Pipeline
# 体育彩票扫盘系统持续集成/持续部署流水线

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, stable-base ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 允许手动触发

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '18'
  DOCKER_BUILDKIT: 1

jobs:
  # ============================================================================
  # 代码质量检查
  # ============================================================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史用于版本号生成

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Python dependencies
      run: |
        cd backend
        pip install -r requirements-dev.txt
        pip install -r requirements.txt

    - name: Install Node.js dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint Python code
      run: |
        cd backend
        echo "🔍 Running Python linting..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        black --check --diff .
        isort --check-only --diff .

    - name: Lint JavaScript/TypeScript code
      run: |
        cd frontend
        echo "🔍 Running JavaScript/TypeScript linting..."
        npm run lint || echo "Lint warnings found but continuing..."

    - name: Check code formatting
      run: |
        cd frontend
        echo "🎨 Checking code formatting..."
        npm run format:check || echo "Formatting issues found but continuing..."

  # ============================================================================
  # 后端测试
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_sport_lottery
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements-dev.txt
        pip install -r requirements.txt

    - name: Setup test environment
      run: |
        cd backend
        # 创建测试环境变量文件
        cat > .env.test << EOF
        DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_sport_lottery
        REDIS_URL=redis://localhost:6379/0
        SECRET_KEY=test-secret-key-for-ci
        ENVIRONMENT=testing
        DEBUG=false
        LOG_LEVEL=INFO
        EOF
        
        # 复制为环境变量文件
        cp .env.test .env

    - name: Run database migrations
      run: |
        cd backend
        echo "🗄️ Running database migrations..."
        alembic upgrade head
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sport_lottery

    - name: Run backend unit tests
      run: |
        cd backend
        echo "🧪 Running backend unit tests..."
        pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sport_lottery
        REDIS_URL: redis://localhost:6379/0

    - name: Run backend integration tests
      run: |
        cd backend
        echo "🔗 Running backend integration tests..."
        pytest tests/integration/ -v
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sport_lottery
        REDIS_URL: redis://localhost:6379/0

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: backend-test-results
        path: |
          backend/htmlcov/
          backend/.pytest_cache/

  # ============================================================================
  # 前端测试
  # ============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Setup test environment
      run: |
        cd frontend
        # 创建测试环境变量
        echo "VITE_API_BASE_URL=http://localhost:8000/api/v1" > .env.test
        echo "VITE_APP_ENV=testing" >> .env.test

    - name: Run frontend unit tests
      run: |
        cd frontend
        echo "🧪 Running frontend unit tests..."
        npm run test:unit -- --run --coverage --reporter=verbose
      env:
        CI: true

    - name: Run frontend component tests
      run: |
        cd frontend
        echo "🧩 Running frontend component tests..."
        npm run test:components -- --run
      env:
        CI: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: frontend-test-results
        path: |
          frontend/coverage/
          frontend/test-results/

  # ============================================================================
  # 安全扫描
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Python security scan
      run: |
        cd backend
        pip install bandit safety
        echo "🔒 Running Python security scan..."
        bandit -r . -f json -o bandit-report.json || true
        safety check --json --output safety-report.json || true

    - name: Run Node.js security scan
      run: |
        cd frontend
        npm audit --audit-level moderate --json > npm-audit.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          backend/bandit-report.json
          backend/safety-report.json
          frontend/npm-audit.json

  # ============================================================================
  # 构建镜像
  # ============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VERSION=${{ github.sha }}
          VCS_REF=${{ github.sha }}

  # ============================================================================
  # 部署到测试环境
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.sport-lottery-sweeper.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /opt/sport-lottery-sweeper
          git pull origin develop
          docker-compose -f docker-compose.staging.yml pull
          docker-compose -f docker-compose.staging.yml up -d --build
          docker system prune -f
          echo "✅ Staging deployment completed"

    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests against staging..."
        # 这里可以添加冒烟测试脚本
        sleep 30  # 等待服务启动
        curl -f https://staging.sport-lottery-sweeper.com/health || exit 1

  # ============================================================================
  # 部署到生产环境
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://sport-lottery-sweeper.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deployment tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "deploy-$(date +'%Y%m%d-%H%M%S')" -m "Production deployment $(date +'%Y-%m-%d %H:%M:%S')"
        git push origin --tags

    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/sport-lottery-sweeper
          git pull origin main
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d --build
          docker system prune -af
          echo "✅ Production deployment completed"

    - name: Post-deployment verification
      run: |
        echo "🔍 Running post-deployment verification..."
        sleep 60  # 等待服务完全启动
        
        # 健康检查
        curl -f https://sport-lottery-sweeper.com/health/live || exit 1
        curl -f https://sport-lottery-sweeper.com/health/ready || exit 1
        
        # API端点测试
        curl -f https://sport-lottery-sweeper.com/api/v1/health || exit 1
        
        echo "✅ Post-deployment verification passed"

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: '🚀 Sport Lottery Sweeper deployed successfully to production!'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================================
  # 清理工作流
  # ============================================================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: Clean up old Docker images
      run: |
        echo "🧹 Cleaning up old Docker images..."
        docker image prune -f
        docker container prune -f

    - name: Clean up workflow artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const daysOld = 30;
          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - daysOld);
          
          const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100
          });
          
          for (const artifact of artifacts) {
            const createdAt = new Date(artifact.created_at);
            if (createdAt < cutoffDate) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }
          }

# =============================================================================
# 定时任务：每日构建和健康检查
# =============================================================================
  daily-health-check:
    name: Daily Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    schedule:
      - cron: '0 2 * * *'  # 每天凌晨2点运行
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run health checks
      run: |
        echo "🏥 Running daily health checks..."
        # 检查生产环境健康状态
        curl -f https://sport-lottery-sweeper.com/health/live || echo "❌ Production health check failed"
        curl -f https://staging.sport-lottery-sweeper.com/health/live || echo "❌ Staging health check failed"

    - name: Generate health report
      run: |
        echo "📊 Generating health report..."
        echo "Health check completed at $(date)" > health-report.txt
        echo "Status: OK" >> health-report.txt

    - name: Upload health report
      uses: actions/upload-artifact@v3
      with:
        name: daily-health-report
        path: health-report.txt