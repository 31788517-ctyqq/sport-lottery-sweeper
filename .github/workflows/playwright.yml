name: Playwright Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'e2e/**'
      - 'frontend/src/views/admin/draw_prediction/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'e2e/**'
      - 'frontend/src/views/admin/draw_prediction/**'

jobs:
  draw-prediction-smoke:
    name: Draw Prediction Smoke (${{ matrix.browser }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run 5-page draw prediction smoke test
        run: npx playwright test e2e/draw-prediction-pages.spec.js --project=${{ matrix.browser }} --workers=1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
